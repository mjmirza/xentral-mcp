name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # BESTPRACTICE_OK: pinned to full commit SHA (checkout v4)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # BESTPRACTICE_OK: pinned to full commit SHA (setup-node v4)
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Dead code scan
        continue-on-error: true
        run: npx -y fallow@2.88.2 dead-code
